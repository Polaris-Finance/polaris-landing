<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 600" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
    </style>

    <!-- Background gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="48%" r="65%">
      <stop offset="0%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#050a14"/>
    </radialGradient>

    <!-- Token circle backgrounds -->
    <radialGradient id="pethCircleBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#0f2a4a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </radialGradient>
    <radialGradient id="polarCircleBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </radialGradient>
    <radialGradient id="pusdCircleBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a2f48"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </radialGradient>
    <radialGradient id="pgoldCircleBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a2a3c"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </radialGradient>
    <radialGradient id="pchfCircleBg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1a2838"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </radialGradient>

    <!-- pETH icon gradients -->
    <linearGradient id="pethAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9ECBEB"/>
      <stop offset="100%" style="stop-color:#7BA5C9"/>
    </linearGradient>
    <linearGradient id="pethDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B95B9"/>
      <stop offset="100%" style="stop-color:#5A84A8"/>
    </linearGradient>

    <!-- pUSD gradient -->
    <linearGradient id="pusdGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F0E6"/>
      <stop offset="100%" style="stop-color:#E8DCC4"/>
    </linearGradient>

    <!-- pGOLD gradients -->
    <linearGradient id="pgoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D76E"/>
      <stop offset="100%" style="stop-color:#D4A830"/>
    </linearGradient>
    <linearGradient id="pgoldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C49A2A"/>
      <stop offset="100%" style="stop-color:#A67C1A"/>
    </linearGradient>

    <!-- pCHF gradient -->
    <linearGradient id="pchfGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2E0E0"/>
      <stop offset="100%" style="stop-color:#D9B3B3"/>
    </linearGradient>

    <!-- POLAR star gradients -->
    <radialGradient id="polarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#9B8FCF;stop-opacity:0.32"/>
      <stop offset="100%" style="stop-color:#9B8FCF;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="polarLeft" x1="0" y1="0.5" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="#9B8FCF" stop-opacity="0"/>
      <stop offset="46.42%" stop-color="#B8A8DF"/>
    </linearGradient>
    <linearGradient id="polarRight" x1="1" y1="0.5" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="#9B8FCF" stop-opacity="0"/>
      <stop offset="46.42%" stop-color="#B8A8DF"/>
    </linearGradient>
    <linearGradient id="polarTop" x1="0.5" y1="0" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="#9B8FCF" stop-opacity="0"/>
      <stop offset="46.42%" stop-color="#B8A8DF"/>
    </linearGradient>
    <linearGradient id="polarBottom" x1="0.5" y1="1" x2="0.5" y2="0.5">
      <stop offset="0%" stop-color="#9B8FCF" stop-opacity="0"/>
      <stop offset="46.42%" stop-color="#B8A8DF"/>
    </linearGradient>

    <!-- Bridge arrow gradient -->
    <linearGradient id="bridgeArrowGrad" gradientUnits="userSpaceOnUse" x1="594" y1="369" x2="706" y2="369">
      <stop offset="0%" style="stop-color:#7BA5C9"/>
      <stop offset="100%" style="stop-color:#9B8FCF"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#7BA5C9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#9B8FCF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowBridge" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#9B8FCF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1300" height="600" fill="url(#bgGradient)"/>

  <!-- ==================== TITLE ==================== -->
  <text x="650" y="52" font-family="'Cormorant Garamond', Georgia, serif" font-size="32" font-weight="600" fill="#E8DCC4" text-anchor="middle" letter-spacing="0.05em">Inward-Facing, Outward-Growing</text>
  <text x="650" y="76" font-family="'Inter', Arial, sans-serif" font-size="13" font-weight="400" fill="rgba(232,220,196,0.5)" text-anchor="middle" letter-spacing="0.08em">HOW POLARIS SEPARATES PROTOCOL SUSTAINABILITY FROM ECOSYSTEM GROWTH</text>

  <!-- ==================== LEFT HALF — INWARD ==================== -->
  <!-- Background panel: x=60 to x=590, center at x=325 -->
  <rect x="60" y="100" width="530" height="480" rx="24" fill="#0d1f3c" stroke="rgba(123,165,201,0.08)" stroke-width="1"/>
  <rect x="60" y="100" width="530" height="480" rx="24" fill="rgba(123,165,201,0.03)"/>

  <!-- Inward header -->
  <text x="325" y="146" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="600" fill="#7BA5C9" text-anchor="middle">Inward</text>
  <text x="325" y="166" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(123,165,201,0.5)" text-anchor="middle">Self-sustaining protocol mechanics</text>

  <!-- ===== pETH Token Circle (r=35, centered at 190, 240) ===== -->
  <g transform="translate(190, 240)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#7BA5C9" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="url(#pethCircleBg)" stroke="#7BA5C9" stroke-width="2" filter="url(#shadow)"/>
    <polygon points="0,-22 0.8,-19.5 3.5,-19.5 1.3,-17.8 2.2,-15.2 0,-17 -2.2,-15.2 -1.3,-17.8 -3.5,-19.5 -0.8,-19.5" fill="#7BA5C9" fill-opacity="0.7"/>
    <g transform="translate(0, 4)">
      <polygon points="0,-12 10,0 0,5 -10,0" fill="url(#pethAccent)"/>
      <polygon points="0,5 10,0 0,14 -10,0" fill="url(#pethDark)"/>
    </g>
    <text x="48" y="6" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" font-weight="500" fill="#E8DCC4" text-anchor="start">pETH</text>
  </g>

  <!-- ===== pUSD Token Circle (r=35, centered at 450, 240) ===== -->
  <g transform="translate(450, 240)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#E8DCC4" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="url(#pusdCircleBg)" stroke="#E8DCC4" stroke-width="2" stroke-opacity="0.3" filter="url(#shadow)"/>
    <polygon points="0,-22 0.8,-19.5 3.5,-19.5 1.3,-17.8 2.2,-15.2 0,-17 -2.2,-15.2 -1.3,-17.8 -3.5,-19.5 -0.8,-19.5" fill="#E8DCC4" fill-opacity="0.6"/>
    <text x="0" y="14" font-family="'Cormorant Garamond', Georgia, serif" font-size="30" font-weight="500" fill="url(#pusdGradient)" text-anchor="middle">$</text>
    <text x="-48" y="6" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" font-weight="500" fill="#E8DCC4" text-anchor="end">pUSD</text>
  </g>

  <!-- ===== Arrows from tokens to cards ===== -->
  <!-- pETH → Floor price growth (straight down from outer circle) -->
  <line x1="190" y1="282" x2="190" y2="393" stroke="#7BA5C9" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <!-- pUSD → Interest rates (fork left from outer circle) -->
  <line x1="435" y1="279" x2="390" y2="393" stroke="#7BA5C9" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowBlue)"/>
  <!-- pUSD → Stability pool incentives (fork right from outer circle) -->
  <line x1="467" y1="279" x2="519" y2="393" stroke="#7BA5C9" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowBlue)"/>

  <!-- ===== Three cards (same row at y=400) ===== -->
  <!-- Floor price growth: centered under pETH -->
  <g transform="translate(108, 400)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="164" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="164" height="50" rx="10" fill="none" stroke="#7BA5C9" stroke-opacity="0.12" stroke-width="1"/>
    <text x="82" y="30" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#7BA5C9" fill-opacity="0.85" text-anchor="middle">Floor price growth</text>
  </g>

  <!-- Interest rates: left under pUSD -->
  <g transform="translate(335, 400)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="110" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="110" height="50" rx="10" fill="none" stroke="#7BA5C9" stroke-opacity="0.12" stroke-width="1"/>
    <text x="55" y="30" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#7BA5C9" fill-opacity="0.85" text-anchor="middle">Interest rates</text>
  </g>

  <!-- Stability pool incentives: right under pUSD -->
  <g transform="translate(455, 400)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="128" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="128" height="50" rx="10" fill="none" stroke="#7BA5C9" stroke-opacity="0.12" stroke-width="1"/>
    <text x="64" y="24" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#7BA5C9" fill-opacity="0.85" text-anchor="middle">Stability pool</text>
    <text x="64" y="40" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#7BA5C9" fill-opacity="0.85" text-anchor="middle">incentives</text>
  </g>

  <!-- Key message (left) -->
  <text x="325" y="530" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="500" fill="#7BA5C9" fill-opacity="0.6" text-anchor="middle">Funded by protocol usage, in hard assets</text>

  <!-- ==================== RIGHT HALF — OUTWARD ==================== -->
  <!-- Background panel: x=710 to x=1240, center at x=975 -->
  <rect x="710" y="100" width="530" height="480" rx="24" fill="#0d1f3c" stroke="rgba(155,143,207,0.08)" stroke-width="1"/>
  <rect x="710" y="100" width="530" height="480" rx="24" fill="rgba(155,143,207,0.03)"/>

  <!-- Outward header -->
  <text x="975" y="146" font-family="'Cormorant Garamond', Georgia, serif" font-size="24" font-weight="600" fill="#9B8FCF" text-anchor="middle">Outward</text>
  <text x="975" y="166" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="400" fill="rgba(155,143,207,0.5)" text-anchor="middle">Ecosystem growth &amp; incentives</text>

  <!-- ===== Upper row: two cards above vePOLAR ===== -->
  <!-- Liquidity pools (upper-left) -->
  <g transform="translate(760, 195)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="160" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="160" height="50" rx="10" fill="none" stroke="#9B8FCF" stroke-opacity="0.12" stroke-width="1"/>
    <text x="80" y="30" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">Liquidity pools</text>
  </g>

  <!-- Pendle markets (upper-right) -->
  <g transform="translate(1030, 195)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="160" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="160" height="50" rx="10" fill="none" stroke="#9B8FCF" stroke-opacity="0.12" stroke-width="1"/>
    <text x="80" y="30" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">Pendle markets</text>
  </g>

  <!-- ===== Dashed arrows: vePOLAR → upper cards ===== -->
  <line x1="950" y1="315" x2="840" y2="248" stroke="#9B8FCF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowPurple)"/>
  <line x1="1000" y1="315" x2="1110" y2="248" stroke="#9B8FCF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowPurple)"/>

  <!-- ===== vePOLAR Token Circle (r=35, centered at 975, 350) ===== -->
  <g transform="translate(975, 350)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#9B8FCF" stroke-width="1" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="url(#polarCircleBg)" stroke="#9B8FCF" stroke-width="2" stroke-opacity="0.4" filter="url(#shadow)"/>
    <circle cx="0" cy="0" r="28" fill="url(#polarGlow)"/>
    <!-- Four-pointed star (scaled to fit r=35) -->
    <g transform="scale(0.7)">
      <path d="M-31,0 L-3.7,-2 0,0 -3.7,2 Z" fill="url(#polarLeft)"/>
      <path d="M31,0 L3.7,-2 0,0 3.7,2 Z" fill="url(#polarRight)"/>
      <path d="M0,-31 L2,-3.7 0,0 -2,-3.7 Z" fill="url(#polarTop)"/>
      <path d="M0,31 L2,3.7 0,0 -2,3.7 Z" fill="url(#polarBottom)"/>
    </g>
    <circle cx="0" cy="0" r="2.5" fill="#B8A8DF"/>
    <text x="48" y="6" font-family="'Cormorant Garamond', Georgia, serif" font-size="16" font-weight="500" fill="#E8DCC4" text-anchor="start">vePOLAR</text>
  </g>

  <!-- ===== Dashed arrows: vePOLAR → lower cards (3 targets) ===== -->
  <line x1="943" y1="385" x2="809" y2="467" stroke="#9B8FCF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowPurple)"/>
  <line x1="975" y1="392" x2="975" y2="467" stroke="#9B8FCF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowPurple)"/>
  <line x1="1007" y1="385" x2="1141" y2="467" stroke="#9B8FCF" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrowPurple)"/>

  <!-- ===== Lower row: three cards below vePOLAR ===== -->
  <!-- Yearn vaults (lower-left) -->
  <g transform="translate(735, 470)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="148" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="148" height="50" rx="10" fill="none" stroke="#9B8FCF" stroke-opacity="0.12" stroke-width="1"/>
    <text x="74" y="30" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">Yearn vaults</text>
  </g>

  <!-- StablecoinOS integrators (lower-center) -->
  <g transform="translate(901, 470)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="148" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="148" height="50" rx="10" fill="none" stroke="#9B8FCF" stroke-opacity="0.12" stroke-width="1"/>
    <text x="74" y="24" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">StablecoinOS</text>
    <text x="74" y="40" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">integrators</text>
  </g>

  <!-- Whitelisted protocols (lower-right, wildcard — dashed border) -->
  <g transform="translate(1067, 470)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="148" height="50" rx="10" fill="rgba(13,31,60,0.85)"/>
    <rect x="0" y="0" width="148" height="50" rx="10" fill="none" stroke="#9B8FCF" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="74" y="24" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">Any whitelisted</text>
    <text x="74" y="40" font-family="'Inter', Arial, sans-serif" font-size="12" font-weight="500" fill="#9B8FCF" fill-opacity="0.85" text-anchor="middle">protocol</text>
  </g>

  <!-- Key message (right) -->
  <text x="975" y="560" font-family="'Inter', Arial, sans-serif" font-size="11" font-weight="500" fill="#9B8FCF" fill-opacity="0.6" text-anchor="middle">vePOLAR directs incentives to the ecosystem around pAssets</text>

  <!-- ==================== CENTER BRIDGE ==================== -->
  <!-- Subtle vertical separator lines -->
  <line x1="600" y1="120" x2="600" y2="580" stroke="rgba(232,220,196,0.04)" stroke-width="1"/>
  <line x1="700" y1="120" x2="700" y2="580" stroke="rgba(232,220,196,0.04)" stroke-width="1"/>

  <!-- "burn pETH" label (top of vertical stack) -->
  <rect x="617" y="279" width="66" height="18" rx="9" fill="#0d1f3c" stroke="rgba(123,165,201,0.15)" stroke-width="1"/>
  <text x="650" y="292" font-family="'Inter', Arial, sans-serif" font-size="9" font-weight="500" fill="#7BA5C9" text-anchor="middle">burn pETH</text>

  <!-- Flame icon — symmetric forked flame, above arrow -->
  <g transform="translate(650, 337)" opacity="0.9">
    <ellipse cx="0" cy="-14" rx="16" ry="22" fill="#7BA5C9" fill-opacity="0.06" filter="url(#softGlow)"/>
    <!-- Outer flame with forked tip -->
    <path d="M0,7 Q-14,-7 -10,-22 Q-7,-31 -4,-36 Q-1,-31 0,-26 Q1,-31 4,-36 Q7,-31 10,-22 Q14,-7 0,7 Z" fill="#7BA5C9" fill-opacity="0.8"/>
    <!-- Mid flame -->
    <path d="M0,4 Q-10,-5 -7,-17 Q-5,-24 -2,-28 Q0,-24 0,-20 Q0,-24 2,-28 Q5,-24 7,-17 Q10,-5 0,4 Z" fill="#9ECBEB" fill-opacity="0.7"/>
    <!-- Inner bright core -->
    <path d="M0,2 Q-5,-2 -4,-12 Q-2,-18 0,-22 Q2,-18 4,-12 Q5,-2 0,2 Z" fill="#E8DCC4" fill-opacity="0.55"/>
  </g>

  <!-- Bridge arrow (horizontal, spanning full gap between panels) -->
  <line x1="594" y1="369" x2="706" y2="369" stroke="url(#bridgeArrowGrad)" stroke-width="2" marker-end="url(#arrowBridge)" opacity="0.85"/>

  <!-- "mint POLAR" label (below arrow) -->
  <rect x="614" y="383" width="72" height="18" rx="9" fill="#0d1f3c" stroke="rgba(155,143,207,0.15)" stroke-width="1"/>
  <text x="650" y="396" font-family="'Inter', Arial, sans-serif" font-size="9" font-weight="500" fill="#9B8FCF" text-anchor="middle">mint POLAR</text>

</svg>