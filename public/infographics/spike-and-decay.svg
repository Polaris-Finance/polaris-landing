<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 780" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&amp;family=Inter:wght@400;500;600&amp;display=swap');
      .title { font-family: 'Cormorant Garamond', Georgia, serif; fill: #F5F0E6; }
      .label { font-family: 'Inter', Arial, sans-serif; fill: #8BA4B8; }
      .label-cream { font-family: 'Inter', Arial, sans-serif; fill: #E8DCC4; }
      .label-purple { font-family: 'Inter', Arial, sans-serif; fill: #B8A8DF; }
    </style>

    <!-- Background gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="45%" r="65%">
      <stop offset="0%" style="stop-color:#0d1f3c"/>
      <stop offset="100%" style="stop-color:#050a14"/>
    </radialGradient>

    <!-- Area fill gradient (under curve) -->
    <linearGradient id="areaFill" x1="0" y1="170" x2="0" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8DCC4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#E8DCC4" stop-opacity="0.01"/>
    </linearGradient>

    <!-- Card top accent gradient -->
    <linearGradient id="cardAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8DCC4" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8DCC4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#E8DCC4" stop-opacity="0"/>
    </linearGradient>

    <!-- Card shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Chart line glow -->
    <filter id="chartGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for dots -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Axis arrow marker -->
    <marker id="axisArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M2,2 L9,5 L2,8" fill="none" stroke="#3A5068" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Clip path for chart content -->
    <clipPath id="chartClip">
      <rect x="210" y="165" width="1035" height="380"/>
    </clipPath>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1400" height="780" fill="url(#bgGradient)"/>

  <!-- Starfield -->
  <!-- Small dots -->
  <circle cx="85" cy="45" r="1.2" fill="#E8DCC4" opacity="0.15"/>
  <circle cx="230" cy="72" r="0.8" fill="#E8DCC4" opacity="0.1"/>
  <circle cx="410" cy="28" r="1" fill="#E8DCC4" opacity="0.12"/>
  <circle cx="620" cy="55" r="0.7" fill="#E8DCC4" opacity="0.08"/>
  <circle cx="890" cy="35" r="1.1" fill="#E8DCC4" opacity="0.14"/>
  <circle cx="1050" cy="60" r="0.9" fill="#E8DCC4" opacity="0.1"/>
  <circle cx="1280" cy="40" r="1.3" fill="#E8DCC4" opacity="0.12"/>
  <circle cx="1350" cy="95" r="0.7" fill="#E8DCC4" opacity="0.09"/>
  <circle cx="55" cy="400" r="0.8" fill="#E8DCC4" opacity="0.1"/>
  <circle cx="1370" cy="350" r="1" fill="#E8DCC4" opacity="0.11"/>
  <circle cx="40" cy="680" r="1.1" fill="#E8DCC4" opacity="0.13"/>
  <circle cx="1360" cy="720" r="0.9" fill="#E8DCC4" opacity="0.1"/>
  <circle cx="180" cy="750" r="0.7" fill="#E8DCC4" opacity="0.08"/>
  <circle cx="750" cy="750" r="1" fill="#E8DCC4" opacity="0.1"/>
  <circle cx="1100" cy="760" r="0.8" fill="#E8DCC4" opacity="0.09"/>
  <!-- 5-point stars -->
  <polygon points="150,120 151.5,124.5 156,124.5 152.5,127.5 153.5,132 150,129 146.5,132 147.5,127.5 144,124.5 148.5,124.5" fill="#E8DCC4" opacity="0.18"/>
  <polygon points="1300,180 1301.5,184.5 1306,184.5 1302.5,187.5 1303.5,192 1300,189 1296.5,192 1297.5,187.5 1294,184.5 1298.5,184.5" fill="#E8DCC4" opacity="0.15"/>
  <polygon points="60,550 61.2,553.5 65,553.5 62,556 63,559.5 60,557 57,559.5 58,556 55,553.5 58.8,553.5" fill="#E8DCC4" opacity="0.2"/>
  <polygon points="1340,500 1341.2,503.5 1345,503.5 1342,506 1343,509.5 1340,507 1337,509.5 1338,506 1335,503.5 1338.8,503.5" fill="#E8DCC4" opacity="0.16"/>
  <polygon points="700,18 701.2,21.5 705,21.5 702,24 703,27.5 700,25 697,27.5 698,24 695,21.5 698.8,21.5" fill="#E8DCC4" opacity="0.12"/>
  <polygon points="1200,750 1201.5,754.5 1206,754.5 1202.5,757.5 1203.5,762 1200,759 1196.5,762 1197.5,757.5 1194,754.5 1198.5,754.5" fill="#E8DCC4" opacity="0.14"/>

  <!-- ==================== TITLE BLOCK ==================== -->
  <text x="700" y="52" class="title" font-size="56" font-weight="600" text-anchor="middle" letter-spacing="0.05em">Spike-and-Decay Pricing</text>
  <text x="700" y="88" font-family="'Inter', Arial, sans-serif" font-size="22" font-weight="400" fill="rgba(232,220,196,0.5)" text-anchor="middle">A continuous auction that self-regulates conversion frequency</text>

  <!-- ==================== MAIN CHART CARD ==================== -->
  <rect x="100" y="120" width="1200" height="480" rx="24" fill="#0d1f3c" stroke="rgba(232,220,196,0.08)" stroke-width="1" filter="url(#shadow)"/>

  <!-- Inner chart area -->
  <rect x="130" y="150" width="1140" height="420" rx="12" fill="#122a4d"/>

  <!-- ==================== GRID LINES ==================== -->
  <g opacity="0.12">
    <line x1="211" y1="250" x2="1240" y2="250" stroke="#3A5068" stroke-width="0.5" stroke-dasharray="4,6"/>
    <line x1="211" y1="320" x2="1240" y2="320" stroke="#3A5068" stroke-width="0.5" stroke-dasharray="4,6"/>
    <line x1="211" y1="460" x2="1240" y2="460" stroke="#3A5068" stroke-width="0.5" stroke-dasharray="4,6"/>
  </g>

  <!-- Y-axis tick marks -->
  <g stroke="#3A5068" stroke-width="1" opacity="0.6">
    <line x1="205" y1="250" x2="210" y2="250"/>
    <line x1="205" y1="320" x2="210" y2="320"/>
    <line x1="205" y1="392" x2="210" y2="392"/>
    <line x1="205" y1="460" x2="210" y2="460"/>
  </g>

  <!-- ==================== CHART AXES ==================== -->
  <!-- Y-axis -->
  <line x1="210" y1="540" x2="210" y2="170" stroke="#3A5068" stroke-width="1"/>
  <line x1="210" y1="170" x2="210" y2="165" stroke="#3A5068" stroke-width="1" marker-end="url(#axisArrow)"/>

  <!-- X-axis -->
  <line x1="210" y1="540" x2="1240" y2="540" stroke="#3A5068" stroke-width="1"/>
  <line x1="1240" y1="540" x2="1245" y2="540" stroke="#3A5068" stroke-width="1" marker-end="url(#axisArrow)"/>

  <!-- Y-axis labels (rotated group) -->
  <g transform="translate(158, 370) rotate(-90)">
    <text x="0" y="0" class="label" font-size="18" font-weight="500" text-anchor="middle">Conversion Price</text>
    <text x="0" y="22" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="400" fill="#627D92" text-anchor="middle">pETH / POLAR</text>
  </g>

  <!-- X-axis label -->
  <text x="1230" y="560" class="label" font-size="18" font-weight="500" text-anchor="end">Time &#x2192;</text>

  <!-- ==================== MARKET PRICE REFERENCE LINE ==================== -->
  <line x1="210" y1="392" x2="1240" y2="392" stroke="#9B8FCF" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.7"/>
  <!-- Label background pill -->
  <rect x="1062" y="363" width="178" height="24" rx="4" fill="#122a4d" opacity="0.9"/>
  <text x="1237" y="382" class="label-purple" font-size="18" font-weight="500" text-anchor="end">POLAR market price</text>

  <!-- ==================== ARBITRAGE SHADED ZONES ==================== -->
  <!-- Arbitrage window 1: between decay phase 1 crossing below market line and spike 1 -->
  <path d="M325,392 L330,395 C340,400 350,410 360,420 C370,428 380,436 390,441 C398,444 404,445 408,444 L410,444 L410,392 Z" fill="#6BCAA0" opacity="0.18"/>

  <!-- Arbitrage window 2: between decay phase 2 crossing below and spike 2 -->
  <path d="M490,392 L490,393 C505,398 520,405 535,414 C550,424 565,432 580,440 C595,446 610,449 625,450 C638,450 645,450 650,450 L650,392 Z" fill="#6BCAA0" opacity="0.18"/>

  <!-- Arbitrage window 3: between decay phase 3 crossing below and spike 3 -->
  <path d="M755,392 L775,397 C790,400 805,408 820,418 C838,430 855,442 870,450 C882,455 892,458 900,458 L900,392 Z" fill="#6BCAA0" opacity="0.18"/>

  <!-- Arbitrage window 4: between decay phase 4 crossing below and spike 4 -->
  <path d="M990,392 L994,396 C1002,404 1010,418 1017,432 C1022,440 1025,444 1028,446 L1028,392 Z" fill="#6BCAA0" opacity="0.18"/>

  <!-- Arbitrage label pointing to window 3 (largest, most visible) -->
  <text x="815" y="368" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="500" fill="#6BCAA0" text-anchor="middle">Arbitrage window</text>
  <!-- Small line from label into shaded zone -->
  <line x1="815" y1="376" x2="815" y2="404" stroke="#6BCAA0" stroke-width="1" opacity="0.4"/>
  <circle cx="815" cy="404" r="2" fill="#6BCAA0" opacity="0.5"/>

  <!-- ==================== AREA FILL UNDER CURVE ==================== -->
  <path d="
    M 220,310
    C 230,315 240,322 250,330
    C 265,342 280,358 295,370
    C 310,382 320,390 330,395
    C 340,400 350,410 360,420
    C 370,428 380,436 390,441
    C 398,444 404,445 408,444
    L 410,444
    L 413,325
    L 415,322
    C 418,320 420,322 422,326
    C 430,340 440,355 450,368
    C 465,380 478,388 490,393
    C 505,398 520,405 535,414
    C 550,424 565,432 580,440
    C 595,446 610,449 625,450
    C 638,450 645,450 648,450
    L 650,450
    L 653,282
    L 655,278
    C 658,276 660,278 662,283
    C 670,300 680,320 692,340
    C 705,358 720,372 735,383
    C 750,390 762,394 775,397
    C 790,400 805,408 820,418
    C 838,430 855,442 870,450
    C 882,455 892,458 898,458
    L 900,458
    L 903,215
    L 905,210
    C 908,208 910,210 912,218
    C 920,245 930,268 940,292
    C 950,315 960,338 970,358
    C 978,372 986,386 994,396
    C 1002,404 1010,418 1017,432
    C 1022,440 1025,444 1027,446
    L 1028,446
    L 1031,340
    L 1033,336
    C 1036,334 1038,340 1041,358
    C 1046,380 1053,398 1064,408
    C 1080,418 1100,424 1130,428
    C 1160,430 1190,431 1210,432
    C 1218,432 1222,432 1225,432
    L 1225,540 L 220,540 Z
  " fill="url(#areaFill)" clip-path="url(#chartClip)"/>

  <!-- ==================== SPIKE-AND-DECAY CURVE ==================== -->
  <path d="
    M 220,310
    C 230,315 240,322 250,330
    C 265,342 280,358 295,370
    C 310,382 320,390 330,395
    C 340,400 350,410 360,420
    C 370,428 380,436 390,441
    C 398,444 404,445 408,444
    L 410,444
    L 413,325
    L 415,322
    C 418,320 420,322 422,326
    C 430,340 440,355 450,368
    C 465,380 478,388 490,393
    C 505,398 520,405 535,414
    C 550,424 565,432 580,440
    C 595,446 610,449 625,450
    C 638,450 645,450 648,450
    L 650,450
    L 653,282
    L 655,278
    C 658,276 660,278 662,283
    C 670,300 680,320 692,340
    C 705,358 720,372 735,383
    C 750,390 762,394 775,397
    C 790,400 805,408 820,418
    C 838,430 855,442 870,450
    C 882,455 892,458 898,458
    L 900,458
    L 903,215
    L 905,210
    C 908,208 910,210 912,218
    C 920,245 930,268 940,292
    C 950,315 960,338 970,358
    C 978,372 986,386 994,396
    C 1002,404 1010,418 1017,432
    C 1022,440 1025,444 1027,446
    L 1028,446
    L 1031,340
    L 1033,336
    C 1036,334 1038,340 1041,358
    C 1046,380 1053,398 1064,408
    C 1080,418 1100,424 1130,428
    C 1160,430 1190,431 1210,432
    C 1218,432 1222,432 1225,432
  " stroke="#E8DCC4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#chartGlow)"/>

  <!-- ==================== SPIKE PEAK DOTS (cream glow) ==================== -->
  <!-- Spike 1 peak (small) at (413, 322) -->
  <circle cx="413" cy="322" r="5" fill="#E8DCC4" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="413" cy="322" r="2.5" fill="#E8DCC4"/>

  <!-- Spike 2 peak (medium) at (653, 278) -->
  <circle cx="653" cy="278" r="5" fill="#E8DCC4" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="653" cy="278" r="2.5" fill="#E8DCC4"/>

  <!-- Spike 3 peak (large) at (903, 210) -->
  <circle cx="903" cy="210" r="5" fill="#E8DCC4" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="903" cy="210" r="2.5" fill="#E8DCC4"/>

  <!-- Spike 4 peak (small) at (1033, 336) -->
  <circle cx="1033" cy="336" r="5" fill="#E8DCC4" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="1033" cy="336" r="2.5" fill="#E8DCC4"/>

  <!-- ==================== TROUGH DOTS (purple glow) ==================== -->
  <!-- Trough before spike 1 at (408, 444) -->
  <circle cx="408" cy="444" r="5" fill="#9B8FCF" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="408" cy="444" r="2.5" fill="#9B8FCF"/>

  <!-- Trough before spike 2 at (648, 450) -->
  <circle cx="648" cy="450" r="5" fill="#9B8FCF" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="648" cy="450" r="2.5" fill="#9B8FCF"/>

  <!-- Trough before spike 3 at (898, 458) -->
  <circle cx="898" cy="458" r="5" fill="#9B8FCF" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="898" cy="458" r="2.5" fill="#9B8FCF"/>

  <!-- Trough before spike 4 at (1028, 446) -->
  <circle cx="1028" cy="446" r="5" fill="#9B8FCF" opacity="0.3" filter="url(#softGlow)"/>
  <circle cx="1028" cy="446" r="2.5" fill="#9B8FCF"/>

  <!-- ==================== CONVERSION EVENT ANNOTATIONS ==================== -->
  <!-- Large spike annotation (spike 3) -->
  <circle cx="903" cy="205" r="2" fill="#E8DCC4" opacity="0.5"/>
  <line x1="903" y1="205" x2="960" y2="185" stroke="#E8DCC4" stroke-width="1" opacity="0.4"/>
  <text x="968" y="192" class="label-cream" font-size="18" font-weight="500">Larger conversion &#x2192; bigger spike</text>

  <!-- Small spike annotation (spike 1) -->
  <circle cx="413" cy="316" r="2" fill="#E8DCC4" opacity="0.4"/>
  <line x1="413" y1="316" x2="440" y2="240" stroke="rgba(232,220,196,0.4)" stroke-width="1"/>
  <text x="448" y="244" font-family="'Inter', Arial, sans-serif" font-size="18" font-weight="400" fill="rgba(232,220,196,0.55)">Small conversion &#x2192; small spike</text>

  <!-- ==================== ANNOTATION CARDS (below chart) ==================== -->
  <!-- Card 1: Price decays (x=100, w=350, 75px gap) -->
  <rect x="100" y="625" width="350" height="80" rx="16" fill="rgba(13,31,60,0.85)" stroke="rgba(232,220,196,0.08)" stroke-width="1"/>
  <line x1="124" y1="625.5" x2="426" y2="625.5" stroke="url(#cardAccent)" stroke-width="1"/>
  <!-- Decay curve icon -->
  <path d="M153,650 C163,650 173,655 188,662 C198,666 208,668 218,669" stroke="#E8DCC4" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <polygon points="216,665 222,669 216,673" fill="#E8DCC4" opacity="0.4"/>
  <text x="236" y="660" class="label-cream" font-size="18" font-weight="500">Price decays until</text>
  <text x="236" y="684" class="label-cream" font-size="18" font-weight="400" opacity="0.55">arbitrage opens</text>

  <!-- Card 2: Converters capture spread (x=525, w=350) -->
  <rect x="525" y="625" width="350" height="80" rx="16" fill="rgba(13,31,60,0.85)" stroke="rgba(232,220,196,0.08)" stroke-width="1"/>
  <line x1="549" y1="625.5" x2="851" y2="625.5" stroke="url(#cardAccent)" stroke-width="1"/>
  <!-- Up arrow icon -->
  <line x1="612" y1="680" x2="612" y2="645" stroke="#9B8FCF" stroke-width="2" opacity="0.7"/>
  <polygon points="606,650 612,640 618,650" fill="#9B8FCF" opacity="0.6"/>
  <!-- Two horizontal level lines -->
  <line x1="602" y1="680" x2="624" y2="680" stroke="#627D92" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="602" y1="648" x2="624" y2="648" stroke="#627D92" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
  <text x="637" y="660" class="label-cream" font-size="18" font-weight="500">Converters capture</text>
  <text x="637" y="684" class="label-cream" font-size="18" font-weight="400" opacity="0.55">the spread</text>

  <!-- Card 3: Spike proportional (x=950, w=350) -->
  <rect x="950" y="625" width="350" height="80" rx="16" fill="rgba(13,31,60,0.85)" stroke="rgba(232,220,196,0.08)" stroke-width="1"/>
  <line x1="974" y1="625.5" x2="1276" y2="625.5" stroke="url(#cardAccent)" stroke-width="1"/>
  <!-- Spike icon -->
  <path d="M997,678 L1007,678 L1010,650 L1013,678 L1024,678" stroke="#E8DCC4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <text x="1037" y="660" class="label-cream" font-size="18" font-weight="500">Spike proportional to</text>
  <text x="1037" y="684" class="label-cream" font-size="18" font-weight="400" opacity="0.55">% of POLAR supply minted</text>

</svg>